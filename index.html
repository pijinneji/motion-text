<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動きとテキスト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: black; overflow: hidden; }
    #videoEl {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.35;
      z-index: 0;
    }
    #mainCanvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

<video id="videoEl" autoplay playsinline muted></video>
<canvas id="mainCanvas"></canvas>

<script type="module">
import { PoseLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js';

const VOCABULARY = {
  slow: ['静止','沈殿','still','皮膚','内側','息','membrane','重力','待機','sediment','止まれない','trace','残像','圧力'],
  medium: ['移行','shift','境界','摩擦','接触','displacement','重なり','距離','between','崩れる','threshold','浸透','反復'],
  fast: ['飛散','scatter','断絶','衝突','逸脱','rupture','過剰','閾値','overflow','解体','fragment','速度','離脱','excess']
};
const COUNT = { slow: 3, medium: 6, fast: 10 };

const video = document.getElementById('videoEl');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let poseLandmarker = null;
let textParticles = [];
let lastGenerateTime = 0;
const GENERATE_INTERVAL = 1500;
let prevLandmarks = null;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class TextParticle {
  constructor(x, y, text, speed) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.alpha = 1;
    this.vy = -0.4 - speed * 2;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.life = 120 + Math.random() * 80;
    this.age = 0;
    this.size = 12 + Math.floor(Math.random() * 12);
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    if (this.age > this.life * 0.5) {
      this.alpha = (this.life - this.age) / (this.life * 0.5);
    }
  }
  isDead() { return this.age >= this.life; }
  draw(ctx) {
    ctx.save();
    ctx.font = `${this.size}px monospace`;
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

async function initPose() {
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
  );
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numPoses: 1
  });
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user' },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(resolve => video.addEventListener('loadedmetadata', resolve));
  await video.play();
}

// landmark座標(0〜1)を画面座標に変換
// x座標は左右反転（フロントカメラのミラー補正）
function lmToScreen(lm) {
  return {
    x: (1 - lm.x) * canvas.width,
    y: lm.y * canvas.height
  };
}

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!poseLandmarker || video.readyState < 2) {
    ctx.fillStyle = 'rgba(100,100,100,0.8)';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('起動中...', canvas.width/2, canvas.height/2);
    ctx.textAlign = 'left';
    textParticles = textParticles.filter(p => !p.isDead());
    for (let p of textParticles) { p.update(); p.draw(ctx); }
    return;
  }

  const result = poseLandmarker.detectForVideo(video, performance.now());

  if (result.landmarks && result.landmarks.length > 0) {
    const landmarks = result.landmarks[0];

    // 動き量を関節ごとに計算
    let jointMotions = landmarks.map((lm, i) => {
      let dist = 0;
      if (prevLandmarks) {
        let dx = lm.x - prevLandmarks[i].x;
        let dy = lm.y - prevLandmarks[i].y;
        dist = Math.sqrt(dx*dx + dy*dy);
      }
      let screen = lmToScreen(lm);
      return { idx: i, dist, x: screen.x, y: screen.y };
    });

    let motionAmount = jointMotions.reduce((sum, j) => sum + j.dist, 0) / landmarks.length;

    prevLandmarks = landmarks.map(l => ({ x: l.x, y: l.y }));

    // テキスト生成
    let now = performance.now();
    if (motionAmount > 0.005 && now - lastGenerateTime > GENERATE_INTERVAL) {
      lastGenerateTime = now;

      let tier = motionAmount < 0.015 ? 'slow' : motionAmount < 0.04 ? 'medium' : 'fast';
      let pool = VOCABULARY[tier];
      let count = COUNT[tier];

      // 動きの大きい関節TOP5から選ぶ
      let sorted = [...jointMotions].sort((a, b) => b.dist - a.dist);
      let topJoints = sorted.slice(0, 8); // 上位8関節

      for (let i = 0; i < count; i++) {
        let joint = topJoints[i % topJoints.length];
        let ox = (Math.random() - 0.5) * 80;
        let oy = (Math.random() - 0.5) * 80;
        let word = pool[Math.floor(Math.random() * pool.length)];
        textParticles.push(new TextParticle(joint.x + ox, joint.y + oy, word, motionAmount * 10));
      }
    }

    // 全関節を赤点で表示（デバッグ用）
    for (let j of jointMotions) {
      ctx.beginPath();
      ctx.arc(j.x, j.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,80,80,0.6)';
      ctx.fill();
    }

    // デバッグ表示
    ctx.font = '11px monospace';
    ctx.fillStyle = 'rgba(150,150,150,0.8)';
    ctx.fillText('motion: ' + motionAmount.toFixed(4), 10, 20);
    ctx.fillText('particles: ' + textParticles.length, 10, 35);
  }

  textParticles = textParticles.filter(p => !p.isDead());
  for (let p of textParticles) { p.update(); p.draw(ctx); }
}

(async () => {
  await initPose();
  await startCamera();
  loop();
})();
</script>
</body>
</html>
