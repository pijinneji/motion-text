<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動きとテキスト</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>

// ml5を使わず、ピクセル差分だけで動き検出するシンプル版
// BodyPixのバージョン問題を回避する

const VOCABULARY = {
  slow: [
    '静止', '沈殿', 'still', '皮膚', '内側',
    '息', 'membrane', '重力', '待機', 'sediment',
    '止まれない', 'trace', '残像', '圧力'
  ],
  medium: [
    '移行', 'shift', '境界', '摩擦', '接触',
    'displacement', '重なり', '距離', 'between',
    '崩れる', 'threshold', '浸透', '反復'
  ],
  fast: [
    '飛散', 'scatter', '断絶', '衝突', '逸脱',
    'rupture', '過剰', '閾値', 'overflow',
    '解体', 'fragment', '速度', '離脱', 'excess'
  ]
};

const COUNT = { slow: 2, medium: 4, fast: 6 };

let capture;
let prevFrame = null;
let textParticles = [];
let lastGenerateTime = 0;
const GENERATE_INTERVAL = 2000;

// 動きがある領域を記録
let motionPixels = [];

class TextParticle {
  constructor(x, y, text, speed) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.alpha = 255;
    this.vy = map(speed, 0, 1, -0.4, -2.5);
    this.vx = random(-0.5, 0.5);
    this.life = floor(map(speed, 0, 1, 200, 90));
    this.age = 0;
    this.size = floor(random(12, 22));
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    if (this.age > this.life * 0.5) {
      this.alpha = map(this.age, this.life * 0.5, this.life, 255, 0);
    }
  }
  isDead() { return this.age >= this.life; }
  draw() {
    push();
    textSize(this.size);
    textFont('monospace');
    fill(255, 255, 255, this.alpha);
    noStroke();
    text(this.text, this.x, this.y);
    pop();
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  capture = createCapture({ video: { facingMode: 'user' }, audio: false });
  capture.size(320, 240); // 軽くするため小さめ
  capture.hide();
  frameRate(30);
}

function draw() {
  background(0);

  if (!capture || capture.width === 0) {
    fill(80);
    textSize(14);
    textAlign(CENTER);
    text('カメラ起動中...', width/2, height/2);
    return;
  }

  // カメラ映像を画面サイズに引き伸ばして描画（暗め）
  tint(80);
  // アスペクト比を保ってカメラ映像を中央に表示
  let camW = capture.width;
  let camH = capture.height;
  let scale = max(width / camW, height / camH);
  let drawW = camW * scale;
  let drawH = camH * scale;
  let offsetX = (width - drawW) / 2;
  let offsetY = (height - drawH) / 2;
  image(capture, offsetX, offsetY, drawW, drawH);
  noTint();

  // 動き検出
  capture.loadPixels();
  let motionAmount = 0;
  motionPixels = [];

  if (prevFrame && prevFrame.length === capture.pixels.length) {
    let diffCount = 0;
    for (let i = 0; i < capture.pixels.length; i += 4) {
      let dr = abs(capture.pixels[i]   - prevFrame[i]);
      let dg = abs(capture.pixels[i+1] - prevFrame[i+1]);
      let db = abs(capture.pixels[i+2] - prevFrame[i+2]);
      let diff = (dr + dg + db) / 3;

      if (diff > 25) { // 閾値：小さいほど敏感
        diffCount++;
        // スクリーン座標に変換
        let pixelIndex = i / 4;
        let px = (pixelIndex % 320) / 320 * width;
        let py = floor(pixelIndex / 320) / 240 * height;
        motionPixels.push({ x: px, y: py });

        // 動き部分を白く光らせる
        let screenI = (floor(py) * width + floor(px)) * 4;
        // ※これは重いので省略、テキストだけで表現
      }
    }
    motionAmount = diffCount / (capture.pixels.length / 4);
  }

  // 前フレームを保存
  prevFrame = capture.pixels.slice();

  // テキスト生成
  let now = millis();
  if (motionAmount > 0.005 && motionPixels.length > 0 && now - lastGenerateTime > GENERATE_INTERVAL) {
    lastGenerateTime = now;
    spawnTexts(motionAmount);
  }

  // テキスト描画
  textParticles = textParticles.filter(p => !p.isDead());
  for (let p of textParticles) {
    p.update();
    p.draw();
  }

  // デバッグ表示（動作確認用）
  fill(150);
  textSize(11);
  textAlign(LEFT);
  text('motion: ' + nf(motionAmount, 1, 4), 10, 20);
  text('particles: ' + textParticles.length, 10, 35);
}

function spawnTexts(motionAmount) {
  let tier = motionAmount < 0.03 ? 'slow' : motionAmount < 0.10 ? 'medium' : 'fast';
  let pool = VOCABULARY[tier];
  let count = COUNT[tier];

  for (let i = 0; i < count; i++) {
    if (motionPixels.length === 0) break;
    let pt = motionPixels[floor(random(motionPixels.length))];
    let word = pool[floor(random(pool.length))];
    let ox = random(-50, 50);
    let oy = random(-50, 50);
    textParticles.push(new TextParticle(pt.x + ox, pt.y + oy, word, motionAmount));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
