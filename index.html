<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動きとテキスト</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: 0;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
      background: transparent;
    }
  </style>
</head>
<body>
<script>

const VOCABULARY = {
  slow: [
    '静止', '沈殿', 'still', '皮膚', '内側',
    '息', 'membrane', '重力', '待機', 'sediment',
    '止まれない', 'trace', '残像', '圧力'
  ],
  medium: [
    '移行', 'shift', '境界', '摩擦', '接触',
    'displacement', '重なり', '距離', 'between',
    '崩れる', 'threshold', '浸透', '反復'
  ],
  fast: [
    '飛散', 'scatter', '断絶', '衝突', '逸脱',
    'rupture', '過剰', '閾値', 'overflow',
    '解体', 'fragment', '速度', '離脱', 'excess'
  ]
};

const COUNT = { slow: 3, medium: 6, fast: 10 };

// 動き検出の解像度（上げると精度UP・処理重くなる）
const DETECT_W = 320;
const DETECT_H = 240;

let video;
let prevFrame = null;
let textParticles = [];
let lastGenerateTime = 0;
const GENERATE_INTERVAL = 1500;
let motionPixels = [];
let videoReady = false;
let offCanvas, offCtx;

class TextParticle {
  constructor(x, y, text, speed) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.alpha = 255;
    this.vy = map(speed, 0, 1, -0.4, -2.5);
    this.vx = random(-0.3, 0.3);
    this.life = floor(map(speed, 0, 1, 200, 90));
    this.age = 0;
    this.size = floor(random(12, 24));
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    if (this.age > this.life * 0.5) {
      this.alpha = map(this.age, this.life * 0.5, this.life, 255, 0);
    }
  }
  isDead() { return this.age >= this.life; }
  draw() {
    push();
    textSize(this.size);
    textFont('monospace');
    fill(255, 255, 255, this.alpha);
    noStroke();
    text(this.text, this.x, this.y);
    pop();
  }
}

function setup() {
  let cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('background', 'transparent');
  clear();
  frameRate(30);

  // オフスクリーンcanvasを事前に作成（毎フレーム生成しない）
  offCanvas = document.createElement('canvas');
  offCanvas.width = DETECT_W;
  offCanvas.height = DETECT_H;
  offCtx = offCanvas.getContext('2d');

  video = document.createElement('video');
  video.setAttribute('playsinline', '');
  video.setAttribute('autoplay', '');
  video.muted = true;
  document.body.insertBefore(video, document.body.firstChild);

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user' },
    audio: false
  }).then(stream => {
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata', () => {
      videoReady = true;
    });
  }).catch(err => {
    console.error('カメラエラー:', err);
  });
}

function draw() {
  clear();

  if (!videoReady) {
    fill(80);
    textSize(14);
    textAlign(CENTER);
    text('カメラ起動中...', width/2, height/2);
    return;
  }

  let vw = video.videoWidth;
  let vh = video.videoHeight;
  if (vw === 0 || vh === 0) return;

  // 動き検出
  offCtx.drawImage(video, 0, 0, DETECT_W, DETECT_H);
  let currentFrame = offCtx.getImageData(0, 0, DETECT_W, DETECT_H).data;

  motionPixels = [];
  let motionAmount = 0;

  if (prevFrame && prevFrame.length === currentFrame.length) {
    let diffCount = 0;
    let total = DETECT_W * DETECT_H;

    for (let i = 0; i < currentFrame.length; i += 4) {
      let dr = abs(currentFrame[i]   - prevFrame[i]);
      let dg = abs(currentFrame[i+1] - prevFrame[i+1]);
      let db = abs(currentFrame[i+2] - prevFrame[i+2]);
      let diff = (dr + dg + db) / 3;

      if (diff > 18) {
        diffCount++;
        let pixelIndex = i / 4;
        // カメラ座標→画面座標に変換
        let px = (pixelIndex % DETECT_W) / DETECT_W * width;
        let py = floor(pixelIndex / DETECT_W) / DETECT_H * height;
        motionPixels.push({ x: px, y: py });
      }
    }

    motionAmount = diffCount / total;

    let now = millis();
    if (motionAmount > 0.003 && motionPixels.length > 0 && now - lastGenerateTime > GENERATE_INTERVAL) {
      lastGenerateTime = now;
      spawnTexts(motionAmount);
    }

    // デバッグ表示
    fill(120);
    textSize(11);
    textAlign(LEFT);
    text('motion: ' + nf(motionAmount, 1, 4), 10, 20);
    text('particles: ' + textParticles.length, 10, 35);
  }

  prevFrame = currentFrame;

  // テキスト描画
  textParticles = textParticles.filter(p => !p.isDead());
  for (let p of textParticles) {
    p.update();
    p.draw();
  }
}

function spawnTexts(motionAmount) {
  let tier = motionAmount < 0.008 ? 'slow' : motionAmount < 0.020 ? 'medium' : 'fast';
  let pool = VOCABULARY[tier];
  let count = COUNT[tier];

  // 動きの多い場所に集中させる
  // motionPixelsをランダムではなく密度の高い場所から選ぶ
  let selected = [];
  for (let i = 0; i < count; i++) {
    // ランダムに3点選んで、その中から他の点に最も近い点を選ぶ
    // →動きが密集している場所が選ばれやすくなる
    let candidates = [];
    for (let j = 0; j < 3; j++) {
      candidates.push(motionPixels[floor(random(motionPixels.length))]);
    }
    // 3点の重心を使う
    let cx = (candidates[0].x + candidates[1].x + candidates[2].x) / 3;
    let cy = (candidates[0].y + candidates[1].y + candidates[2].y) / 3;
    selected.push({ x: cx, y: cy });
  }

  for (let i = 0; i < count; i++) {
    let pt = selected[i];
    let word = pool[floor(random(pool.length))];
    let ox = random(-30, 30);
    let oy = random(-30, 30);
    textParticles.push(new TextParticle(pt.x + ox, pt.y + oy, word, motionAmount));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
